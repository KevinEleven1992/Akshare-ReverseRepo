<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国央行逆回购数据日历 (含14天预测)</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fc-event { border: none !important; padding: 2px 4px; font-size: 0.75rem !important; }
        .bg-injection { background-color: #ef4444 !important; }      /* 历史投放：红色 */
        .bg-maturity { background-color: #10b981 !important; }       /* 历史到期：绿色 */
        .bg-forecast-mat { 
            background-color: #a7f3d0 !important; 
            color: #065f46 !important; 
            border: 1px dashed #059669 !important; 
        } /* 未来预估到期：淡绿+虚线边框 */
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-3 md:p-8">
    <div class="max-w-5xl mx-auto bg-white p-4 md:p-6 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800">中国央行逆回购数据日历</h1>
            <p class="text-sm text-gray-500 mt-2">数据源: AkShare | 单位: 亿元 | 独家支持未来14天到期预测</p>
            <div class="flex justify-center flex-wrap gap-4 mt-3 text-xs">
                <span class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-full mr-1"></span> 历史逆回购投放</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-1"></span> 历史逆回购到期</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-emerald-200 border border-dashed border-emerald-600 rounded mr-1"></span> 未来14天预估到期 (流动性回笼)</span>
            </div>
        </div>
        
        <div id='calendar' class="bg-white"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-cn',
                height: 'auto',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },
                buttonText: { today: '今天', month: '月' },
                events: function(info, successCallback, failureCallback) {
                    fetch('data.json?t=' + new Date().getTime())
                        .then(response => response.json())
                        .then(data => {
                            let events = [];
                            data.forEach(item => {
                                if (item.is_forecast) {
                                    // 未来14天预测到期显示样式
                                    if (item.maturity > 0) {
                                        events.push({
                                            title: `⚠️ 预估到期: -${item.maturity}亿`,
                                            start: item.date,
                                            className: 'bg-forecast-mat font-semibold'
                                        });
                                    }
                                } else {
                                    // 历史真实数据
                                    if (item.injection > 0) {
                                        events.push({
                                            title: `投放: +${item.injection}亿`,
                                            start: item.date,
                                            className: 'bg-injection text-white rounded'
                                        });
                                    }
                                    if (item.maturity > 0) {
                                        events.push({
                                            title: `到期: -${item.maturity}亿`,
                                            start: item.date,
                                            className: 'bg-maturity text-white rounded'
                                        });
                                    }
                                }
                            });
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error("加载数据失败", error);
                            failureCallback(error);
                        });
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
