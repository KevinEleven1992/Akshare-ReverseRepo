<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国央行逆回购数据日历 (智能聚焦版)</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-3 md:p-8">
    <div class="max-w-5xl mx-auto bg-white p-4 md:p-6 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800">中国央行逆回购数据日历</h1>
            <p class="text-sm text-gray-500 mt-2">约束状态：仅保留7天历史 | 科学推演：未来14天逆回购刚性到期量</p>
            <div class="flex justify-center flex-wrap gap-4 mt-3 text-xs">
                <span class="flex items-center"><span class="w-3 h-3 bg-[#EF4444] rounded-full mr-1"></span> 历史逆回购操作(投放)</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-[#10B981] rounded-full mr-1"></span> 历史逆回购到期</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-[#059669] rounded-full mr-1"></span> 未来14天预估到期(回笼压力)</span>
            </div>
        </div>
        
        <div id='calendar' class="bg-white"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-cn',
                height: 'auto',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },
                buttonText: { today: '今天', month: '月' },
                events: function(info, successCallback, failureCallback) {
                    // 读取同目录下的数据文件
                    fetch('data.json?t=' + new Date().getTime())
                        .then(response => response.json())
                        .then(data => {
                            if (!data || data.length === 0) {
                                alert("数据正在初始化或接口受限，请稍后通过 GitHub Actions 手动重试。");
                                successCallback([]);
                                return;
                            }

                            let events = [];
                            let latestHistoryDate = null;

                            data.forEach(item => {
                                if (item.is_forecast) {
                                    // 未来14天科学计算数据展示
                                    if (item.maturity > 0) {
                                        events.push({
                                            title: `🔮 预测到期: -${item.maturity}亿`,
                                            start: item.date,
                                            color: '#059669',
                                            textColor: '#ffffff'
                                        });
                                    }
                                } else {
                                    // 仅保留的过去7天真实历史
                                    if (item.injection > 0) {
                                        events.push({
                                            title: `投放: +${item.injection}亿`,
                                            start: item.date,
                                            color: '#EF4444',
                                            textColor: '#ffffff'
                                        });
                                    }
                                    if (item.maturity > 0) {
                                        events.push({
                                            title: `到期: -${item.maturity}亿`,
                                            start: item.date,
                                            color: '#10B981',
                                            textColor: '#ffffff'
                                        });
                                    }
                                    // 追踪最新的历史有效日期
                                    if (!latestHistoryDate || item.date > latestHistoryDate) {
                                        latestHistoryDate = item.date;
                                    }
                                }
                            });

                            // ⭐ 核心修复：自动将日历视野跳转到有最新数据的月份，防止由于周末或数据滞后导致的白屏
                            if (latestHistoryDate) {
                                calendar.gotoDate(latestHistoryDate);
                            }

                            successCallback(events);
                        })
                        .catch(error => {
                            console.error("未能成功加载清洗后的 data.json", error);
                            failureCallback(error);
                        });
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
